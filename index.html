<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A playful classroom seat shuffler with a nostalgic school notebook aesthetic. Randomize seat assignments instantly!">
  <title>Shuffl - Random Seat Shuffler</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Doodle Background Layer (images injected by JS) -->
  <div id="doodle-layer" class="doodle-layer"></div>


  <!-- Main Content Wrapper -->
  <div class="main-content">

  <!-- ==================== PAGE 1: LANDING ==================== -->
  <main id="landing-page" class="page active">
    <h1 class="landing-title">
      Shuffl
      <img src="./assets/bag-picture.png" alt="School bag" class="title-bag-icon">
    </h1>
    <p class="landing-subtitle">
      Shuffle your seats based on your roll numbers!
    </p>
    <button id="start-btn" class="landing-btn" onclick="goToApp()">
      Shuffle Seats
    </button>
  </main>

  <!-- ==================== PAGE 2: MAIN APP ==================== -->
  <section id="app-page" class="page">

    <!-- Left Panel — Clipboard -->
    <aside class="left-panel">
      <div class="clipboard">
        <h2 class="clipboard-title">Settings</h2>

        <div class="input-group">
          <label for="total-students">Number of Students</label>
          <input type="number" id="total-students" placeholder="e.g. 35" min="1" max="200">
        </div>

        <div class="input-group">
          <label for="num-rows">Number of Rows</label>
          <input type="number" id="num-rows" placeholder="e.g. 5" min="1" max="10">
        </div>

        <div class="input-group">
          <label for="num-cols">Number of Columns</label>
          <input type="number" id="num-cols" placeholder="e.g. 6, 9..." min="3" max="12">
        </div>

        <hr class="clipboard-divider">

        <button class="shuffle-btn" onclick="shuffleSeats()">
          Shuffle!
        </button>

        <button class="back-btn" onclick="goToHome()">
          &larr; Back to Home
        </button>
      </div>
    </aside>

    <!-- Center Panel — Seat Grid -->
    <div class="center-panel">
      <h2 class="grid-title">Classroom Layout</h2>
      <div id="seat-grid" class="seat-grid"></div>
    </div>

  </section>

  </div><!-- /.main-content -->

  <!-- Footer -->
  <footer class="site-footer">
    <span>Classroom Seat Shuffler &bull; Built by Vishnu &bull; v1.0</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
